<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hades</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    width:100%;
    height:100vh;

    background-image:url("bg.jpg");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    overflow:hidden;

    font-family:'Cinzel', serif;
}

/* escurece */
body::before{

    content:"";

    position:absolute;

    width:100%;
    height:100%;

    background:rgba(0,0,0,0.25);

}

/* menu */
.menu{

    position:relative;

    z-index:2;

    height:100vh;

    display:flex;

    flex-direction:column;

    justify-content:center;

    padding-left:8%;
}

.menu h1{

    color:white;

    font-size:5rem;

    margin-bottom:40px;

    letter-spacing:8px;
}

/* links */
.menu a{

    color:white;

    text-decoration:none;

    font-size:1.2rem;

    margin:12px 0;

    letter-spacing:5px;

    transition:0.4s ease;

    width:fit-content;
}

/* hover */
.menu a:hover{

    color:#8b0000;

    transform:translateX(10px);

    text-shadow:
    0 0 10px #8b0000;

    letter-spacing:8px;
}

</style>

</head>

<body>

<div class="menu">

<h1>HADES</h1>

<a href="#">SHADOWS</a>

<a href="#">PERSONALITY</a>

<a href="#">TRUE FORM</a>

<a href="#">VOICE CLAIM</a>

<a href="#">PAVOR</a>

<a href="#">PLAYLIST</a>

</div>

</body>
</html>
