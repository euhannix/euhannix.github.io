<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hades</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    width:100%;
    height:100vh;

    background-image:url("images/bg.jpg");

    background-size:cover;

    /* joga a imagem mais pra direita */
    background-position:75% center;

    background-repeat:no-repeat;

    overflow:hidden;

    font-family:'Cinzel', serif;
}

/* camada escura cinematográfica */
body::before{

    content:"";

    position:absolute;

    top:0;
    left:0;

    width:100%;
    height:100%;

    background:
    linear-gradient(
        to right,
        rgba(0,0,0,0.75),
        rgba(0,0,0,0.15)
    );

    z-index:1;
}

/* container principal */
.menu{

    position:relative;

    z-index:2;

    height:100vh;

    display:flex;

    flex-direction:column;

    justify-content:center;

    padding-left:8%;
}

/* logo png */
.logo{

    width:500px;

    margin-bottom:40px;

    filter:
    drop-shadow(0 0 25px rgba(0,0,0,0.9));

}

/* links menu */
.menu a{

    color:white;

    text-decoration:none;

    font-family:'Cormorant Garamond', serif;

    font-size:1.4rem;

    font-weight:300;

    margin:10px 0;

    letter-spacing:6px;

    transition:0.45s ease;

    width:fit-content;

    text-shadow:
    0 0 10px rgba(0,0,0,0.7);
}

/* hover cinematográfico */
.menu a:hover{

    color:#7a0000;

    transform:translateX(12px);

    letter-spacing:10px;

    text-shadow:
    0 0 8px #7a0000,
    0 0 20px #7a0000;
}

/* celular */
@media(max-width:768px){

    body{

        background-position:70% center;
    }

    .menu{

        padding-left:10%;
    }

    .logo{

        width:280px;
    }

    .menu a{

        font-size:1.1rem;

        letter-spacing:4px;
    }
}

</style>

</head>

<body>

<div class="menu">

<!-- logo png -->
<img src="images/logo.png" class="logo">

<a href="#">SHADOWS</a>

<a href="#">PERSONALITY</a>

<a href="#">TRUE FORM</a>

<a href="#">VOICE CLAIM</a>

<a href="#">PAVOR</a>

<a href="#">PLAYLIST</a>

</div>

</body>
</html>
